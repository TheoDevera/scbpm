services:
  scpitch:
    build: .
    container_name: scpitch
    restart: unless-stopped
    ports:
      - "47823:47823"
    environment:
      - TZ=Europe/Paris
      - PYTHONUNBUFFERED=1
      - SCPITCH_PORT=47823
      - SCBPM_TOKEN=${SCBPM_TOKEN}
    volumes:
      - ./frontend:/app/frontend:ro
      - ./backend:/app/backend:ro
      - scpitch_cache:/app/cache

volumes:
  scpitch_cache:
